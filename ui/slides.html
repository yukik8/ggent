<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ggent — generated deck</title>
<style>
  :root { --bg:#0e1116; --panel:#161b23; --line:#2a3240; --text:#dbe2ec; --dim:#8a94a6; --gold:#f5c542; }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 16px/1.6 -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  #stage { display: flex; height: 100vh; }
  #slide { flex: 1; display: flex; flex-direction: column; justify-content: center;
           padding: 7vh 8vw; cursor: pointer; position: relative; }
  #deckTitle { position: absolute; top: 22px; left: 8vw; color: var(--dim); font-size: 13px; letter-spacing: .05em; }
  #slideNo { position: absolute; top: 22px; right: 8vw; color: var(--dim); font-size: 13px; }
  #slide h1 { font-size: clamp(28px, 4.5vw, 52px); line-height: 1.15; margin-bottom: 4vh; }
  #slide ul { list-style: none; }
  #slide li { font-size: clamp(17px, 1.9vw, 26px); color: #c6cedb; margin-bottom: 2.4vh;
              padding-left: 28px; position: relative; }
  #slide li::before { content: "—"; position: absolute; left: 0; color: var(--gold); }
  #visual { margin-top: 4vh; color: var(--dim); font-size: 14px; border: 1px dashed var(--line);
            border-radius: 8px; padding: 10px 16px; display: inline-block; }
  #dots { position: absolute; bottom: 24px; left: 8vw; display: flex; gap: 8px; }
  .dotn { width: 8px; height: 8px; border-radius: 50%; background: var(--line); }
  .dotn.on { background: var(--gold); }
  /* evidence rail */
  #rail { width: 330px; background: var(--panel); border-left: 1px solid var(--line);
          padding: 22px 20px; overflow-y: auto; transition: margin-right .25s; }
  #rail.hidden { margin-right: -330px; }
  #rail h2 { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .ev { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
  .ev .id { font-family: ui-monospace, monospace; font-size: 12px; color: var(--gold); }
  .ev .why { font-size: 12.5px; color: var(--dim); margin-top: 4px; }
  .ev .confbar { height: 5px; border-radius: 3px; background: var(--gold); margin-top: 7px; }
  #hint { position: fixed; bottom: 20px; right: 24px; color: var(--dim); font-size: 12px; }
  .pill { background: #1d2530; border: 1px solid var(--line); border-radius: 20px; padding: 1px 9px; font-size: 11px; }
  /* risks slide */
  .riskcard { border: 1px solid #5a3030; background: #1d1416; border-radius: 10px;
              padding: 16px 20px; margin-bottom: 16px; max-width: 720px; }
  .riskcard .fid { font-family: ui-monospace, monospace; font-size: 13px; color: #e05555; }
  .riskcard .lesson { font-size: clamp(15px, 1.6vw, 20px); margin-top: 6px; color: #c6cedb; }
  .predcard { border: 1px solid var(--line); background: var(--panel); border-radius: 10px;
              padding: 16px 20px; max-width: 720px; margin-top: 3vh; }
  .predcard .lbl { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); }
  .predcard p { font-size: 14.5px; color: #c6cedb; margin-top: 6px; }
</style>
</head>
<body>
<div id="stage">
  <div id="slide">
    <div id="deckTitle"></div>
    <div id="slideNo"></div>
    <div id="content"></div>
    <div id="dots"></div>
  </div>
  <div id="rail"><h2>Why this slide</h2><div id="evList"></div></div>
</div>
<div id="hint"><span class="pill">←→ / click</span> navigate <span class="pill">e</span> evidence rail <span class="pill">r</span> reload</div>

<script>
let deck = null, idx = 0;

async function load() {
  deck = await (await fetch("/demo/slides")).json();
  idx = Math.min(idx, deck.slides.length); // keep position on reload
  render();
}

function render() {
  const total = deck.slides.length + 1; // + risks/prediction closer
  document.getElementById("deckTitle").textContent = deck.deck_title;
  document.getElementById("slideNo").textContent = `${idx + 1} / ${total}`;
  document.getElementById("dots").innerHTML =
    Array.from({ length: total }, (_, i) => `<div class="dotn ${i === idx ? "on" : ""}"></div>`).join("");

  const c = document.getElementById("content");
  const ev = document.getElementById("evList");

  if (idx < deck.slides.length) {
    const s = deck.slides[idx];
    c.innerHTML = `<h1>${s.title}</h1>
      <ul>${s.bullets.map((b) => `<li>${b}</li>`).join("")}</ul>
      ${s.visual_hint ? `<div id="visual">visual: ${s.visual_hint}</div>` : ""}`;
    ev.innerHTML = (s.evidence ?? []).map((e) => `
      <div class="ev">
        <div class="id">${e.id}</div>
        <div class="why">${e.why ?? ""}</div>
        ${e.confidence != null ? `<div class="confbar" style="width:${e.confidence * 100}%"></div>` : ""}
      </div>`).join("") || `<div class="ev"><div class="why">no citations</div></div>`;
  } else {
    // closer: risks designed around + the logged prediction
    c.innerHTML = `<h1>Risks we designed around</h1>
      ${(deck.avoided_risks ?? []).map((r) => `
        <div class="riskcard">
          <div class="fid">${r.fail_case}</div>
          <div class="lesson">${r.lesson}</div>
        </div>`).join("")}
      ${deck.prediction ? `
        <div class="predcard">
          <div class="lbl">Prediction logged to the brain — ${deck.prediction.id}</div>
          <p><strong>expects:</strong> ${deck.prediction.expects}</p>
          <p><strong>risks:</strong> ${deck.prediction.risks}</p>
        </div>` : ""}`;
    ev.innerHTML = `<div class="ev"><div class="why">Every card cites a real fail node in the graph.
      When this pitch's result lands, the prediction is scored and the brain updates itself.</div></div>`;
  }
}

function nav(d) {
  if (!deck) return;
  idx = Math.max(0, Math.min(deck.slides.length, idx + d));
  render();
}
document.getElementById("slide").addEventListener("click", () => nav(1));
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") nav(1);
  if (e.key === "ArrowLeft") nav(-1);
  if (e.key === "e") document.getElementById("rail").classList.toggle("hidden");
  if (e.key === "r") load();
});
load();
</script>
</body>
</html>
